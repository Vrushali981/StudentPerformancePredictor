<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Performance Predictor</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#05050f; color:#e8e8f0;
    font-family:'Segoe UI',sans-serif;
    padding:20px;
  }
  h1 { color:#f0c96b; margin-bottom:5px; }
  .sub { color:#6b6b8a; font-size:0.85rem; margin-bottom:30px; }

  /* STATS */
  .stats {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px; margin-bottom:24px;
  }
  .stat {
    background:#0d0d1f;
    border:1px solid rgba(201,168,76,0.2);
    border-radius:12px; padding:16px;
    text-align:center;
  }
  .stat-num { font-size:2rem; font-weight:bold; }
  .stat-lbl { font-size:0.7rem; color:#6b6b8a; margin-top:4px; }
  .c-gold{color:#f0c96b;} .c-red{color:#ff4d6d;}
  .c-yellow{color:#ffd166;} .c-green{color:#06d6a0;}

  /* GRID */
  .grid {
    display:grid;
    grid-template-columns:1fr 1.5fr;
    gap:20px; margin-bottom:20px;
  }
  .card {
    background:#0d0d1f;
    border:1px solid rgba(201,168,76,0.15);
    border-radius:14px; padding:22px;
  }
  .card-title {
    font-size:0.7rem; letter-spacing:2px;
    color:#c9a84c; margin-bottom:18px;
    font-weight:700;
  }

  /* FORM */
  label {
    display:block; font-size:0.72rem;
    color:#6b6b8a; margin-bottom:5px;
    letter-spacing:1px;
  }
  input[type=text] {
    width:100%; background:#111128;
    border:1px solid rgba(201,168,76,0.2);
    border-radius:8px; padding:10px;
    color:#e8e8f0; font-size:0.85rem;
    outline:none; margin-bottom:14px;
  }
  input[type=range] {
    width:100%; margin-bottom:4px;
    accent-color:#c9a84c;
  }
  .val-display {
    text-align:right; font-size:0.8rem;
    color:#f0c96b; margin-bottom:12px;
  }
  .btn {
    width:100%; background:linear-gradient(135deg,#c9a84c,#f0c96b);
    color:#05050f; border:none; border-radius:10px;
    padding:12px; font-size:0.95rem;
    font-weight:bold; cursor:pointer;
    margin-top:6px; transition:opacity 0.2s;
  }
  .btn:hover { opacity:0.85; }

  /* RESULT */
  .result {
    display:none; margin-top:16px;
    border-radius:10px; padding:16px;
    animation:fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
  }
  .r-high   {background:rgba(255,77,109,0.1);
              border:1px solid rgba(255,77,109,0.3);}
  .r-medium {background:rgba(255,209,102,0.1);
              border:1px solid rgba(255,209,102,0.3);}
  .r-low    {background:rgba(6,214,160,0.1);
              border:1px solid rgba(6,214,160,0.3);}
  .r-title  { font-size:1.3rem; font-weight:bold; }
  .r-conf   { font-size:0.75rem; color:#6b6b8a; margin:4px 0 10px; }
  .r-sugg   { font-size:0.82rem; line-height:1.6;
               background:rgba(255,255,255,0.04);
               border-radius:8px; padding:10px; }

  /* TABLE */
  table { width:100%; border-collapse:collapse; font-size:0.8rem; }
  th {
    text-align:left; padding:8px 10px;
    color:#6b6b8a; font-size:0.65rem;
    letter-spacing:1px; border-bottom:1px solid rgba(255,255,255,0.08);
  }
  td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.04); }
  .pill {
    padding:3px 10px; border-radius:20px;
    font-size:0.65rem; font-weight:bold;
  }
  .p-high   {background:rgba(255,77,109,0.15);color:#ff4d6d;}
  .p-medium {background:rgba(255,209,102,0.15);color:#ffd166;}
  .p-low    {background:rgba(6,214,160,0.15);color:#06d6a0;}

  .loading { color:#6b6b8a; font-size:0.85rem; padding:20px; text-align:center; }

  @media(max-width:700px) {
    .grid,.stats { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<h1>🎓 EduPredict — Student Performance Predictor</h1>
<p class="sub">// PS-05 · AI & EDTECH · Powered by Real ML Model</p>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <div class="stat-num c-gold" id="total">-</div>
    <div class="stat-lbl">TOTAL STUDENTS</div>
  </div>
  <div class="stat">
    <div class="stat-num c-red" id="high">-</div>
    <div class="stat-lbl">HIGH RISK 🔴</div>
  </div>
  <div class="stat">
    <div class="stat-num c-yellow" id="medium">-</div>
    <div class="stat-lbl">MEDIUM RISK 🟡</div>
  </div>
  <div class="stat">
    <div class="stat-num c-green" id="low">-</div>
    <div class="stat-lbl">SAFE 🟢</div>
  </div>
</div>

<div class="grid">

  <!-- PREDICTION FORM -->
  <div class="card">
    <div class="card-title">⚡ PREDICT STUDENT RISK</div>

    <label>STUDENT NAME</label>
    <input type="text" id="sname" placeholder="Enter student name..."/>

    <label>ATTENDANCE — <span id="attV">75</span>%</label>
    <input type="range" id="att" min="0" max="100" value="75"
      oninput="document.getElementById('attV').textContent=this.value"/>

    <label>SUBJECT 1 MARKS — <span id="m1V">70</span>/100</label>
    <input type="range" id="m1" min="0" max="100" value="70"
      oninput="document.getElementById('m1V').textContent=this.value"/>

    <label>SUBJECT 2 MARKS — <span id="m2V">65</span>/100</label>
    <input type="range" id="m2" min="0" max="100" value="65"
      oninput="document.getElementById('m2V').textContent=this.value"/>

    <label>ASSIGNMENTS — <span id="asV">80</span>/100</label>
    <input type="range" id="as" min="0" max="100" value="80"
      oninput="document.getElementById('asV').textContent=this.value"/>

    <button class="btn" onclick="predictRisk()">
      ⚡ PREDICT WITH ML MODEL
    </button>

    <!-- RESULT BOX -->
    <div class="result" id="resultBox">
      <div class="r-title" id="rTitle"></div>
      <div class="r-conf" id="rConf"></div>
      <div class="r-sugg" id="rSugg"></div>
    </div>
  </div>

  <!-- STUDENT TABLE -->
  <div class="card">
    <div class="card-title">📋 CLASS DASHBOARD</div>
    <div id="tableArea">
      <div class="loading">Loading students... ⏳</div>
    </div>
  </div>

</div>

<script>
// ─── LOAD STUDENTS ON PAGE LOAD ──────────────
window.onload = function() {
  loadStudents();
}

// ─── LOAD ALL STUDENTS FROM FLASK ────────────
async function loadStudents() {
  try {
    // Fetch data from our Flask API
    const response = await fetch("/students");
    const data = await response.json();

    // Update stats
    document.getElementById("total").textContent  = data.total;
    document.getElementById("high").textContent   = data.high;
    document.getElementById("medium").textContent = data.medium;
    document.getElementById("low").textContent    = data.low;

    // Build table
    let html = `
      <table>
        <thead>
          <tr>
            <th>ATTEND%</th>
            <th>AVG MARKS</th>
            <th>ASSIGN</th>
            <th>RISK</th>
          </tr>
        </thead>
        <tbody>`;

    data.students.forEach(s => {
      const pillClass = s.risk==="High"   ? "p-high"   :
                        s.risk==="Medium" ? "p-medium" : "p-low";
      const emoji     = s.risk==="High"   ? "🔴"       :
                        s.risk==="Medium" ? "🟡"       : "🟢";
      html += `
        <tr>
          <td>${s.attendance}%</td>
          <td>${s.avg_marks}/100</td>
          <td>${s.assignments}/100</td>
          <td>
            <span class="pill ${pillClass}">
              ${emoji} ${s.risk}
            </span>
          </td>
        </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById("tableArea").innerHTML = html;

  } catch(err) {
    document.getElementById("tableArea").innerHTML =
      `<div class="loading">
        ❌ Could not load data.<br/>
        Make sure Flask is running!
      </div>`;
  }
}

// ─── PREDICT FUNCTION ─────────────────────────
async function predictRisk() {
  const btn = document.querySelector('.btn');
  btn.textContent = "Predicting... ⏳";
  btn.disabled = true;

  try {
    // Send data to Flask /predict route
    const response = await fetch("/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        name:        document.getElementById("sname").value,
        attendance:  document.getElementById("att").value,
        marks1:      document.getElementById("m1").value,
        marks2:      document.getElementById("m2").value,
        assignments: document.getElementById("as").value,
      })
    });

    const result = await response.json();

    if(result.success) {
      showResult(result);
    } else {
      alert("Error: " + result.error);
    }

  } catch(err) {
    alert("Cannot connect to Flask server!\nMake sure app.py is running.");
  }

  btn.textContent = "⚡ PREDICT WITH ML MODEL";
  btn.disabled = false;
}

// ─── SHOW RESULT ──────────────────────────────
function showResult(result) {
  const box = document.getElementById("resultBox");

  // Set color class
  box.className = "result r-" + result.risk.toLowerCase();
  box.style.display = "block";

  const emoji = result.risk==="High"   ? "🔴" :
                result.risk==="Medium" ? "🟡" : "🟢";

  document.getElementById("rTitle").textContent =
    emoji + " " + result.risk.toUpperCase() + " RISK";

  document.getElementById("rConf").textContent =
    `ML Confidence: ${result.confidence}% · Avg Marks: ${result.avg_marks}/100`;

  document.getElementById("rSugg").textContent =
    result.suggestion;
}
</script>
</body>
</html>
